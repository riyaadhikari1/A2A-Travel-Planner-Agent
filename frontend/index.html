<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyager — AI Travel Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c10;
    --bg-card:   #111318;
    --bg-input:  #161920;
    --border:    rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text:      #e8e6e0;
    --text-muted:#7a7870;
    --text-dim:  #3d3c38;
    --accent:    #c9a96e;
    --accent-dim:#7a6340;
    --green:     #4a9e7a;
    --red:       #c25858;
    --blue:      #5887c2;
    --purple:    #c278c2;
    --r:         10px;
    --r-sm:      6px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ── sidebar ─────────────────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    gap: 32px;
    overflow-y: auto;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 32px; height: 32px;
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 16px;
  }
  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .suggestion-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .suggestion-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(201,169,110,0.04);
  }

  .agents-status {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .agent-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.active  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .dot.error   { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── main ─────────────────────────── */
  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--text-muted);
  }
  .new-chat-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 6px 14px;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .new-chat-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  /* ── messages ─────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    margin: auto;
    text-align: center;
    max-width: 420px;
  }
  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .empty-sub {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .msg { display: flex; gap: 12px; max-width: 800px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .msg-avatar {
    background: rgba(201,169,110,0.1);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .msg-body { flex: 1; }

  .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .msg.user .msg-bubble {
    background: rgba(201,169,110,0.06);
    border-color: var(--accent-dim);
  }

  .status-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 0;
  }
  .status-spinner {
    width: 12px; height: 12px;
    border: 1px solid var(--text-dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── artifact cards ──────────────── */
  .artifacts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }

  .artifact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    animation: cardIn 0.4s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .artifact-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .artifact-icon {
    width: 20px; height: 20px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .artifact-weather        .artifact-label { color: var(--blue); }
  .artifact-weather        .artifact-icon  { background: rgba(88,135,194,0.15); }
  .artifact-intl_flight    .artifact-label { color: var(--accent); }
  .artifact-intl_flight    .artifact-icon  { background: rgba(201,169,110,0.15); }
  .artifact-domestic_flight .artifact-label { color: var(--accent); }
  .artifact-domestic_flight .artifact-icon  { background: rgba(201,169,110,0.15); }
  .artifact-hotel          .artifact-label { color: var(--green); }
  .artifact-hotel          .artifact-icon  { background: rgba(74,158,122,0.15); }
  .artifact-budget         .artifact-label { color: var(--purple); }
  .artifact-budget         .artifact-icon  { background: rgba(194,120,194,0.15); }

  .artifact-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 4px;
  }
  .artifact-meta {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .artifact-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }
  .artifact-list-item {
    font-size: 12px;
    color: var(--text-muted);
    padding: 6px 8px;
    background: rgba(255,255,255,0.02);
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .artifact-list-item span:first-child {
    color: var(--text);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .artifact-list-item .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .budget-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
  }
  .budget-row:last-child { border-bottom: none; }
  .budget-row.total {
    color: var(--text);
    font-weight: 500;
    font-size: 14px;
    padding-top: 8px;
  }

  /* ── input area ─────────────────── */
  .input-area {
    padding: 20px 32px 28px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 16px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within {
    border-color: var(--accent-dim);
  }

  #chat-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    overflow-y: auto;
  }
  #chat-input::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: var(--r-sm);
    border: 1px solid var(--accent-dim);
    background: rgba(201,169,110,0.08);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    transition: all 0.2s;
  }
  .send-btn:hover:not(:disabled) {
    background: rgba(201,169,110,0.16);
  }
  .send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    padding-left: 2px;
  }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: rgba(194,88,88,0.15);
    border: 1px solid rgba(194,88,88,0.3);
    border-radius: var(--r-sm);
    padding: 10px 16px;
    font-size: 13px;
    color: #e07070;
    animation: toastIn 0.3s ease;
    z-index: 99;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">✦</div>
      <span class="logo-text">Voyager</span>
    </div>

    <div>
      <div class="sidebar-section-label">Try asking</div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="fillInput(this.textContent.trim())">
          Fly from Kathmandu to Bangkok next Friday, 3 nights
        </button>
        <button class="suggestion-btn" onclick="fillInput(this.textContent.trim())">
          Plan a trip from KTM to Dubai on 2026-07-10, 5 nights
        </button>
        <button class="suggestion-btn" onclick="fillInput(this.textContent.trim())">
          Domestic flight from Kathmandu to Pokhara this weekend
        </button>
        <button class="suggestion-btn" onclick="fillInput(this.textContent.trim())">
          Trip from KTM to Singapore on 2026-08-01, 4 nights
        </button>
      </div>
    </div>

    <div class="agents-status">
      <div class="sidebar-section-label">Agents</div>
      <div class="agent-dot"><div class="dot" id="dot-weather"></div> Weather</div>
      <div class="agent-dot"><div class="dot" id="dot-intl_flight"></div> Intl Flight</div>
      <div class="agent-dot"><div class="dot" id="dot-domestic_flight"></div> Domestic Flight</div>
      <div class="agent-dot"><div class="dot" id="dot-hotel"></div> Hotels</div>
      <div class="agent-dot"><div class="dot" id="dot-budget"></div> Budget</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Plan your journey</span>
      <button class="new-chat-btn" onclick="resetChat()">+ New chat</button>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-title">Where to next?</div>
        <div class="empty-sub">Describe your trip and I'll search flights, hotels, weather and estimate your budget — all at once.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="chat-input"
          placeholder="Fly from Kathmandu to Bangkok on 2026-07-15…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">↑</button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </main>

</div>

<script>
const GATEWAY = '';
let isLoading = false;

function qs(sel) { return document.querySelector(sel); }

function hideEmpty() {
  const e = qs('#empty-state');
  if (e) e.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function fillInput(text) {
  const inp = qs('#chat-input');
  inp.value = text;
  autoResize(inp);
  inp.focus();
}

function setLoading(on) {
  isLoading = on;
  qs('#send-btn').disabled = on;
  qs('#chat-input').disabled = on;
}

function scrollBottom() {
  const m = qs('#messages');
  m.scrollTop = m.scrollHeight;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function setDot(agent, state) {
  const d = qs('#dot-' + agent);
  if (d) d.className = 'dot ' + state;
}

function resetDots() {
  ['weather', 'intl_flight', 'domestic_flight', 'hotel', 'budget'].forEach(a => setDot(a, ''));
}

function addUserMsg(text) {
  hideEmpty();
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">you</div>
    <div class="msg-body">
      <div class="msg-bubble">${escHtml(text)}</div>
    </div>`;
  qs('#messages').appendChild(div);
  scrollBottom();
}

function addAssistantMsg() {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-avatar">ai</div>
    <div class="msg-body" id="assistant-body">
      <div class="status-line" id="status-line">
        <div class="status-spinner"></div>
        <span id="status-text">Planning your trip…</span>
      </div>
    </div>`;
  qs('#messages').appendChild(div);
  scrollBottom();
  return div;
}

function setStatus(text) {
  const el = qs('#status-text');
  if (el) el.textContent = text;
}

function getOrCreateGrid() {
  const body = qs('#assistant-body');
  if (!body) return null;

  let grid = body.querySelector('.artifacts-grid');
  if (!grid) {
    const sl = body.querySelector('.status-line');
    if (sl) {
      sl.outerHTML = `<div class="msg-bubble" style="margin-bottom:12px">Here's what I found for your trip:</div>`;
    }
    grid = document.createElement('div');
    grid.className = 'artifacts-grid';
    body.appendChild(grid);
  }
  return grid;
}

/* ── artifact renderers ──────────────── */
function renderWeather(payload) {
  setDot('weather', 'active');
  const cur  = payload.current || {};
  const temp = cur.temperature_2m ?? '—';
  const wind = cur.wind_speed_10m ?? '—';
  const city = payload.location || 'Unknown';
  return `
    <div class="artifact-label"><div class="artifact-icon">☁</div>Weather</div>
    <div class="artifact-value">${temp}°C</div>
    <div class="artifact-meta">${escHtml(city)}<br>Wind ${wind} km/h</div>`;
}

function renderIntlFlight(payload) {
  setDot('intl_flight', 'active');
  const fares     = (payload.fares && payload.fares.data) ? payload.fares.data : [];
  const origin    = payload.origin || 'KTM';
  const dest      = payload.destination || '—';
  const startDate = payload.start_date || '';
  const searchUrl = `https://www.google.com/travel/flights?q=flights+from+${origin}+to+${dest}+on+${startDate}`;
  return `
    <div class="artifact-label"><div class="artifact-icon">✈</div>Intl Flight</div>
    <div class="artifact-value">${fares.length} fare${fares.length !== 1 ? 's' : ''}</div>
    <div class="artifact-meta">${escHtml(origin)} → ${escHtml(dest)}<br>${escHtml(startDate)}</div>
    <div class="artifact-list">
      ${fares.slice(0, 3).map(f => `
        <div class="artifact-list-item">
          <span>${escHtml(f.carrier || '—')} · ${escHtml(f.date || '')}</span>
          <span class="badge">NPR ${Number(f.price || 0).toLocaleString()}</span>
        </div>`).join('')}
      ${fares.length === 0 ? '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No fares found</div>' : ''}
    </div>
    <a href="${escHtml(searchUrl)}" target="_blank" rel="noopener" style="display:block;margin-top:10px;font-size:11px;color:var(--accent);text-decoration:none;">Search on Google Flights →</a>`;
}

function renderDomesticFlight(payload) {
  setDot('domestic_flight', 'active');
  const offers = payload.offers || [];
  const found  = payload.flights_found || 0;
  const searchUrl = `https://www.tripturbo.com`;
  return `
    <div class="artifact-label"><div class="artifact-icon">✈</div>Domestic Flight</div>
    <div class="artifact-value">${found} flight${found !== 1 ? 's' : ''}</div>
    <div class="artifact-meta">${escHtml(payload.origin || '')} → ${escHtml(payload.destination || '')}<br>${escHtml(payload.departure_date || '')}</div>
    <div class="artifact-list">
      ${offers.slice(0, 3).map(o => `
        <div class="artifact-list-item">
          <span>${escHtml(o.flight_number || o.airline || '—')}</span>
          <span class="badge">NPR ${Number(o.fare_npr || 0).toLocaleString()}</span>
        </div>`).join('')}
      ${found === 0 ? '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No flights found</div>' : ''}
    </div>
    <a href="${escHtml(searchUrl)}" target="_blank" rel="noopener" style="display:block;margin-top:10px;font-size:11px;color:var(--accent);text-decoration:none;">Search on TripTurbo →</a>`;
}

function renderHotel(payload) {
  setDot('hotel', 'active');
  const hotels = payload.hotels || [];
  const found  = payload.hotels_found || 0;
  return `
    <div class="artifact-label"><div class="artifact-icon">⌂</div>Hotels</div>
    <div class="artifact-value">${found}</div>
    <div class="artifact-meta">${escHtml(payload.city || '')}</div>
    <div class="artifact-list">
      ${hotels.slice(0, 3).map(h => `
        <div class="artifact-list-item">
          <a href="${escHtml(h.link || '#')}" target="_blank" rel="noopener"
             style="color:var(--text);text-decoration:none;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;">
            ${escHtml(h.name || '—')}
          </a>
          <span class="badge" style="flex-shrink:0">${h.rating ? '★ ' + h.rating : '↗'}</span>
        </div>`).join('')}
      ${found === 0 ? '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No hotels found</div>' : ''}
    </div>`;
}
function renderBudget(payload) {
  setDot('budget', 'active');
  const total   = payload.total || 0;
  const intl    = payload.intl_flight || 0;
  const dom     = payload.domestic_flight || 0;
  const flights = intl + dom;
  return `
    <div class="artifact-label"><div class="artifact-icon">$</div>Budget</div>
    <div class="artifact-value">$${total.toFixed(0)}</div>
    <div class="artifact-meta">${payload.days || 3} days · ${payload.nights || 3} nights</div>
    <div style="margin-top:10px">
      <div class="budget-row"><span>Flights</span><span>$${flights.toFixed(0)}</span></div>
      <div class="budget-row"><span>Hotels</span><span>$${(payload.hotel_cost || 0).toFixed(0)}</span></div>
      <div class="budget-row"><span>Daily</span><span>$${(payload.daily_expenses || 0).toFixed(0)}</span></div>
      <div class="budget-row total"><span>Total</span><span>$${total.toFixed(0)}</span></div>
    </div>`;
}

function renderArtifact(artifactJson) {
  let data;
  try { data = JSON.parse(artifactJson); } catch { return; }

  const type    = data.type || data.artifact_type;
  const payload = data.payload || {};
  if (!type) return;

  const grid = getOrCreateGrid();
  if (!grid) return;

  const card = document.createElement('div');
  card.className = `artifact-card artifact-${type}`;

  switch (type) {
    case 'weather':          card.innerHTML = renderWeather(payload);        break;
    case 'intl_flight':      card.innerHTML = renderIntlFlight(payload);     break;
    case 'domestic_flight':  card.innerHTML = renderDomesticFlight(payload); break;
    case 'hotel':            card.innerHTML = renderHotel(payload);          break;
    case 'budget':           card.innerHTML = renderBudget(payload);         break;
    default: return;
  }

  grid.appendChild(card);
  scrollBottom();
}

function renderComplete() {
  const sl = qs('#status-line');
  if (sl) sl.remove();
}

function renderFailed() {
  const body = qs('#assistant-body');
  if (!body) return;
  const sl = body.querySelector('.status-line');
  if (sl) sl.remove();
  const el = document.createElement('div');
  el.className = 'msg-bubble';
  el.style.borderColor = 'rgba(194,88,88,0.3)';
  el.style.color = '#e07070';
  el.textContent = 'Something went wrong processing your request. Please try again.';
  body.appendChild(el);
  resetDots();
}

/* ── SSE stream parser ──────────────── */
async function sendMessage() {
  if (isLoading) return;
  const inp  = qs('#chat-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  autoResize(inp);
  setLoading(true);
  resetDots();

  addUserMsg(text);
  addAssistantMsg();

  ['weather', 'intl_flight', 'domestic_flight', 'hotel', 'budget'].forEach(a => setDot(a, 'loading'));

  try {
    const resp = await fetch(`${GATEWAY}/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text }),
    });

    if (!resp.ok) throw new Error(`Gateway returned ${resp.status}`);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer       = '';
    let currentEvent = null;
    let done         = false;

    while (!done) {
      const { done: streamDone, value } = await reader.read();
      if (streamDone) { done = true; break; }

      buffer += decoder.decode(value, { stream: true });

      // SSE spec: events are separated by double newline
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // keep incomplete last chunk

      for (const part of parts) {
        const lines = part.split('\n');
        let eventType = null;
        let eventData = null;

        for (const line of lines) {
          if (line.startsWith('event:')) {
            eventType = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            eventData = line.slice(5).trim();
          }
        }

        if (!eventType || !eventData) continue;

        if (eventType === 'status') {
          if (eventData === 'running')   { setStatus('Calling agents…'); }
          if (eventData === 'completed') { renderComplete(); done = true; break; }
          if (eventData === 'failed')    { renderFailed();  done = true; break; }
        }

        if (eventType === 'artifact') {
          try {
            const parsed = JSON.parse(eventData);
            const type   = parsed.type || parsed.artifact_type;
            if (type) setStatus(`Got ${type} data…`);
          } catch {}
          renderArtifact(eventData);
        }
      }
    }

    renderComplete();

  } catch (err) {
    renderFailed();
    showToast('Could not reach gateway. Is it running?');
    console.error(err);
  } finally {
    setLoading(false);
  }
}

function resetChat() {
  const m = qs('#messages');
  m.innerHTML = `<div class="empty-state" id="empty-state">
    <div class="empty-title">Where to next?</div>
    <div class="empty-sub">Describe your trip and I'll search flights, hotels, weather and estimate your budget — all at once.</div>
  </div>`;
  resetDots();
  setLoading(false);
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
